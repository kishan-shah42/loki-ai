<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loki AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #0d0d0d;
            color: #ececec;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #header {
            padding: 16px 24px;
            border-bottom: 1px solid #1e1e1e;
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            text-align: center;
            letter-spacing: 1px;
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 750px;
            width: 100%;
            margin: 0 auto;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }

        .message.user { align-self: flex-end; align-items: flex-end; }
        .message.loki { align-self: flex-start; align-items: flex-start; }

        .label {
            font-size: 11px;
            color: #666;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.6;
        }

        .message.user .bubble {
            background-color: #2f2f2f;
            color: #ececec;
            border-bottom-right-radius: 4px;
        }

        .message.loki .bubble {
            background-color: #1a1a1a;
            color: #ececec;
            border-bottom-left-radius: 4px;
            border: 1px solid #2a2a2a;
        }

        #input-area {
            padding: 16px 20px;
            border-top: 1px solid #1e1e1e;
            display: flex;
            gap: 10px;
            max-width: 750px;
            width: 100%;
            margin: 0 auto 16px;
        }

        #user-input {
            flex: 1;
            background-color: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 12px 16px;
            color: #ececec;
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
        }

        #user-input:focus { border-color: #555; }

        #user-input::placeholder { color: #555; }

        button {
            background-color: #ffffff;
            color: #000;
            border: none;
            border-radius: 12px;
            padding: 12px 20px;
            font-size: 15px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        button:hover { background-color: #e0e0e0; }

        .typing {
            color: #555;
            font-size: 13px;
            padding-left: 4px;
        }

        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-track { background: transparent; }
        #chat-box::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="header">⚡ Loki AI</div>

    <div id="chat-box" id="chat-box"></div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Message Loki...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById("user-input");
            const chatBox = document.getElementById("chat-box");
            const message = input.value.trim();
            if (!message) return;

            chatBox.innerHTML += `
                <div class="message user">
                    <div class="label">Kishan</div>
                    <div class="bubble">${message}</div>
                </div>`;
            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            chatBox.innerHTML += `<div class="typing" id="typing">Loki is thinking...</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            const response = await fetch("/chat", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({message: message})
            });

            const data = await response.json();

            document.getElementById("typing").remove();

            chatBox.innerHTML += `
                <div class="message loki">
                    <div class="label">Loki</div>
                    <div class="bubble">${data.reply}</div>
                </div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        document.getElementById("user-input").addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
