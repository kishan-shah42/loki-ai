<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loki AI</title>
    <style>
.mode-btn {
    background-color: #1a1a1a;
    color: #ececec;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 13px;
    cursor: pointer;
    font-weight: normal;
    transition: background 0.2s;
}

.mode-btn:hover { background-color: #222; }

.active-mode {
    background-color: #2a2a2a !important;
    border-color: #555 !important;
    color: #fff !important;
}
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0d0d0d;
            color: #ececec;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            height: 100vh;
        }

        /* SIDEBAR */
       #sidebar {
    width: 220px;
    background-color: #111111;
    border-right: 1px solid #1e1e1e;
    display: flex;
    flex-direction: column;
    padding: 20px 16px;
    gap: 10px;
}

@media (max-width: 600px) {
    body {
        flex-direction: column;
    }

    #sidebar {
        width: 100%;
        flex-direction: row;
        padding: 10px;
        border-right: none;
        border-bottom: 1px solid #1e1e1e;
        gap: 8px;
        flex-wrap: wrap;
    }

    #sidebar h2 {
        display: none;
    }

    #user-bar {
        width: 100%;
        order: -1;
    }

    .sidebar-btn {
        flex: 1;
        justify-content: center;
        font-size: 12px;
        padding: 8px 10px;
    }

    #chat-box {
        padding: 16px 12px;
    }

    #input-area {
        padding: 10px 12px;
        margin-bottom: 8px;
    }

    #chart-section {
        padding: 20px 12px;
    }

    #chart-upload-box {
        padding: 24px 16px;
    }

    .message {
        max-width: 95%;
    }

    #suggestion-cards {
        flex-direction: column;
    }

    #suggestion-cards button {
        max-width: 100% !important;
    }
}

        #sidebar h2 {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .sidebar-btn {
            background-color: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 12px 14px;
            color: #ececec;
            font-size: 14px;
            cursor: pointer;
            text-align: left;
            transition: background 0.2s;
            display: flex;
            align-items: center;

        }

        .sidebar-btn:hover { background-color: #222; }
        .sidebar-btn.active { background-color: #2a2a2a; border-color: #444; }

        .sidebar-btn span { font-size: 18px; }

        /* MAIN */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #header {
            padding: 16px 24px;
            border-bottom: 1px solid #1e1e1e;
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            text-align: center;
            letter-spacing: 1px;
        }

        /* CHAT SECTION */
        #chat-section {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #chart-section {
            flex: 1;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 750px;
            width: 100%;
            margin: 0 auto;
        }

        .message { display: flex; flex-direction: column; max-width: 80%; }
        .message.user { align-self: flex-end; align-items: flex-end; }
        .message.loki { align-self: flex-start; align-items: flex-start; }

        .label {
            font-size: 11px;
            color: #666;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .message.user .bubble {
            background-color: #2f2f2f;
            color: #ececec;
            border-bottom-right-radius: 4px;
        }

        .message.loki .bubble {
            background-color: #1a1a1a;
            color: #ececec;
            border-bottom-left-radius: 4px;
            border: 1px solid #2a2a2a;
        }

        #input-area {
            padding: 16px 20px;
            border-top: 1px solid #1e1e1e;
            display: flex;
            gap: 10px;
            max-width: 750px;
            width: 100%;
            margin: 0 auto 16px;
        }

        #user-input {
            flex: 1;
            background-color: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 12px 16px;
            color: #ececec;
            font-size: 15px;
            outline: none;
        }

        #user-input:focus { border-color: #555; }
        #user-input::placeholder { color: #555; }

        button {
            background-color: #ffffff;
            color: #000;
            border: none;
            border-radius: 12px;
            padding: 12px 20px;
            font-size: 15px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        button:hover { background-color: #e0e0e0; }

        .typing {
            color: #555;
            font-size: 13px;
            padding-left: 4px;
        }

        /* CHART ANALYSIS */
        #chart-upload-box {
            background-color: #1a1a1a;
            border: 2px dashed #2a2a2a;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            width: 100%;
            max-width: 600px;
            cursor: pointer;
            transition: border 0.2s;
        }

        #chart-upload-box:hover { border-color: #555; }

        #chart-upload-box p {
            color: #555;
            margin-top: 10px;
            font-size: 14px;
        }

        #chart-upload-box .icon { font-size: 48px; }

        #chart-result {
            margin-top: 30px;
            background-color: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 600px;
            font-size: 15px;
            line-height: 1.8;
            white-space: pre-wrap;
            display: none;
        }

        #chart-input { display: none; }

        #analyze-btn {
            margin-top: 16px;
            display: none;
        }

        #preview-img {
            margin-top: 16px;
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            display: none;
        }

        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-track { background: transparent; }
        #chat-box::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }

        /* AUTH OVERLAY */
        #auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.88);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #auth-card {
            background-color: #111111;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 380px;
        }

        #auth-card h2 {
            color: #fff;
            text-align: center;
            margin-bottom: 6px;
            font-size: 22px;
        }

        #auth-card p.subtitle {
            color: #666;
            text-align: center;
            font-size: 13px;
            margin-bottom: 24px;
        }

        .auth-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .auth-tab-btn {
            flex: 1;
            background-color: #1a1a1a;
            color: #ececec;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 10px;
            font-size: 13px;
            cursor: pointer;
            font-weight: normal;
            transition: background 0.2s;
        }

        .auth-input {
            width: 100%;
            margin-bottom: 12px;
            background-color: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 12px 14px;
            color: #ececec;
            font-size: 14px;
            outline: none;
        }

        .auth-input:focus { border-color: #555; }
        .auth-input::placeholder { color: #555; }

        #auth-error {
            display: none;
            color: #ff6b6b;
            font-size: 13px;
            margin-bottom: 14px;
            text-align: center;
        }

        #auth-submit-btn { width: 100%; margin-top: 4px; }

        /* USER BAR (sidebar) */
        #user-bar {
            display: none;
            flex-direction: column;
            gap: 6px;
            padding: 10px;
            background-color: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            margin-bottom: 4px;
        }

        #user-bar-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 6px;
        }

        #user-email {
            font-size: 12px;
            color: #ececec;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 130px;
        }

        #user-badge {
            font-size: 10px;
            padding: 2px 7px;
            border-radius: 6px;
            background-color: #2a2a2a;
            color: #aaa;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        #user-usage {
            font-size: 11px;
            color: #666;
        }

        #logout-btn {
            background-color: transparent;
            color: #888;
            border: 1px solid #2a2a2a;
            padding: 6px;
            font-size: 11px;
            font-weight: normal;
        }

        #logout-btn:hover { background-color: #1a1a1a; color: #ececec; }
    </style>
</head>
<body>

    <!-- AUTH OVERLAY -->
    <div id="auth-overlay">
        <div id="auth-card">
            <h2>⚡ Loki AI</h2>
            <p class="subtitle">Sign in to continue</p>

            <div class="auth-tabs">
                <button id="tab-login" class="auth-tab-btn active-mode" onclick="switchAuthTab('login')">Log In</button>
                <button id="tab-signup" class="auth-tab-btn" onclick="switchAuthTab('signup')">Sign Up</button>
            </div>

            <div id="auth-error"></div>

            <input type="email" id="auth-email" class="auth-input" placeholder="Email">
            <input type="password" id="auth-password" class="auth-input" placeholder="Password">

            <button id="auth-submit-btn" onclick="submitAuth()">Log In</button>
        </div>
    </div>

    <!-- SIDEBAR -->
    <div id="sidebar">
        <h2>⚡ Loki AI</h2>

        <div id="user-bar">
            <div id="user-bar-top">
                <span id="user-email"></span>
                <span id="user-badge">FREE</span>
            </div>
            <div id="user-usage"></div>
            <button id="logout-btn" onclick="logout()">Log Out</button>
        </div>

        <button class="sidebar-btn active" id="btn-chat" onclick="showSection('chat')">
            <span>💬</span> Chat
        </button>
      <button class="sidebar-btn" id="btn-chart" onclick="showSection('chart')">
            <span>📊</span> Chart Analysis
        </button>
        <button class="sidebar-btn" id="btn-risk" onclick="showSection('risk')">
            <span>📊</span> Risk Analysis
        </button>
    </div>

    <!-- MAIN -->
    <div id="main">
        <div id="header">⚡ Loki AI</div>

        <!-- CHAT SECTION -->
        <div id="chat-section">
            <div id="chat-box">
    <div id="suggestions">
        <p style="color:#555; font-size:13px; margin-bottom:16px; text-align:center;">Try asking Loki...</p>
        <div id="suggestion-cards" style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center;"></div>
    </div>
</div>
          
  <div id="input-area">
                <input type="text" id="user-input" placeholder="Message Loki...">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>

      <!-- CHART SECTION -->
        <div id="chart-section">

            <!-- MODE SELECTOR -->
            <div id="mode-selector" style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-bottom:24px;">
                <button class="mode-btn active-mode" onclick="selectMode('ema', this)">📉 EMA 9/15</button>
                <button class="mode-btn" onclick="selectMode('smc', this)">🧠 SMC</button>
                <button class="mode-btn" onclick="selectMode('sr', this)">📈 Support & Resistance</button>
                <button class="mode-btn" onclick="selectMode('custom', this)">✏️ Custom Strategy</button>
            </div>

            <!-- CUSTOM STRATEGY BOX -->
            <div id="custom-strategy-box" style="display:none; width:100%; max-width:600px; margin-bottom:20px;">
                <textarea id="strategy-input" placeholder="Describe your trading strategy in simple words... e.g. I look for breakouts above resistance with high volume and RSI above 50" style="width:100%; height:120px; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:12px; padding:14px; color:#ececec; font-size:14px; outline:none; resize:none;"></textarea>
                <button onclick="generatePrompt()" style="margin-top:10px; background:#1a1a1a; color:#ececec; border:1px solid #555;">⚡ Generate Analysis Prompt</button>
            </div>

            <!-- GENERATED PROMPT REVIEW -->
            <div id="prompt-review-box" style="display:none; width:100%; max-width:600px; margin-bottom:20px;">
                <p style="color:#888; font-size:13px; margin-bottom:8px;">Loki understood your strategy as:</p>
                <textarea id="generated-prompt" style="width:100%; height:150px; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:12px; padding:14px; color:#ececec; font-size:13px; outline:none; resize:none;"></textarea>
                <button onclick="approvePrompt()" style="margin-top:10px; background:#ffffff; color:#000;">✅ Looks Good, Upload Chart</button>
            </div>

            <!-- UPLOAD BOX -->
            <div id="chart-upload-box" onclick="document.getElementById('chart-input').click()">
                <div class="icon">📈</div>
                <h3>Upload Your Chart</h3>
                <p>Click to upload a chart screenshot for AI trade analysis</p>
                <img id="preview-img" src="" alt="preview">
            </div>

            <input type="file" id="chart-input" accept="image/*" onchange="previewChart(event)">
            <button id="analyze-btn" onclick="analyzeChart()" style="display:none;">🔍 Analyze Trade</button>
            <button id="reset-btn" onclick="resetChart()" style="display:none; background-color:#1a1a1a; color:#ececec; border:1px solid #2a2a2a; margin-top:10px;">🔄 Analyze New Chart</button>

            <div id="chart-result"></div>
        </div>

        <!-- RISK ANALYSIS SECTION -->
         <div id="risk-section" style="display:none; flex:1; flex-direction:column; align-items:center; justify-content:flex-start; padding:30px 20px; overflow-y:auto;">
            
            <h2 style="color:#fff; margin-bottom:24px; font-size:20px;">📊 Risk Analysis</h2>

            <div style="width:100%; max-width:600px; display:flex; flex-direction:column; gap:14px;">
                
                <!-- Direction -->
                <div>
                    <label style="color:#888; font-size:13px;">Trade Direction</label>
                    <div style="display:flex; gap:10px; margin-top:8px;">
                        <button id="btn-long" onclick="setDirection('long')" style="flex:1; background:#1a1a1a; color:#ececec; border:1px solid #555;">📈 Long</button>
                        <button id="btn-short" onclick="setDirection('short')" style="flex:1; background:#1a1a1a; color:#ececec; border:1px solid #2a2a2a;">📉 Short</button>
                    </div>
                </div>

                <!-- Entry Price -->
                <div>
                    <label style="color:#888; font-size:13px;">Entry Price *</label>
                    <input type="number" id="entry-price" placeholder="e.g. 66000" style="width:100%; margin-top:6px; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:12px; padding:12px 16px; color:#ececec; font-size:15px; outline:none;">
                </div>

                <!-- Current Price -->
                <div>
                    <label style="color:#888; font-size:13px;">Current Price *</label>
                    <input type="number" id="current-price" placeholder="e.g. 67000" style="width:100%; margin-top:6px; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:12px; padding:12px 16px; color:#ececec; font-size:15px; outline:none;">
                </div>

                <!-- Stop Loss -->
                <div>
                    <label style="color:#888; font-size:13px;">Stop Loss *</label>
                    <input type="number" id="stop-loss" placeholder="e.g. 65000" style="width:100%; margin-top:6px; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:12px; padding:12px 16px; color:#ececec; font-size:15px; outline:none;">
                </div>

                <!-- Take Profit -->
                <div>
                    <label style="color:#888; font-size:13px;">Take Profit *</label>
                    <input type="number" id="take-profit" placeholder="e.g. 69000" style="width:100%; margin-top:6px; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:12px; padding:12px 16px; color:#ececec; font-size:15px; outline:none;">
                </div>

                <!-- Capital (Optional) -->
                <div>
                    <label style="color:#888; font-size:13px;">Total Capital (Optional)</label>
                    <input type="number" id="capital" placeholder="e.g. 10000" style="width:100%; margin-top:6px; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:12px; padding:12px 16px; color:#ececec; font-size:15px; outline:none;">
                </div>

                <!-- Chart Upload (Optional) -->
                <div>
                    <label style="color:#888; font-size:13px;">Chart Screenshot (Optional)</label>
                    <div id="risk-upload-box" onclick="document.getElementById('risk-chart-input').click()" style="margin-top:6px; background:#1a1a1a; border:2px dashed #2a2a2a; border-radius:12px; padding:20px; text-align:center; cursor:pointer;">
                        <p style="color:#555; font-size:13px;">📎 Click to upload chart</p>
                        <img id="risk-preview-img" src="" style="display:none; max-width:100%; max-height:200px; border-radius:8px; margin-top:10px;">
                    </div>
                    <input type="file" id="risk-chart-input" accept="image/*" style="display:none;" onchange="previewRiskChart(event)">
                </div>

                <button onclick="analyzeRisk()" style="margin-top:10px;">⚡ Analyze My Trade</button>

                <div id="risk-result" style="display:none; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:16px; padding:24px; font-size:15px; line-height:1.8; white-space:pre-wrap; margin-top:10px;"></div>

            </div>
        </div>
    </div>

   <script>
    // ===================== AUTH =====================
    let currentUser = null;
    let authMode = 'login';

    function loadUser() {
        const stored = localStorage.getItem('loki_user');
        return stored ? JSON.parse(stored) : null;
    }

    function saveUser(user) {
        localStorage.setItem('loki_user', JSON.stringify(user));
        currentUser = user;
    }

    function logout() {
        localStorage.removeItem('loki_user');
        currentUser = null;
        location.reload();
    }

    function showAuthOverlay() {
        document.getElementById('auth-overlay').style.display = 'flex';
    }

    function hideAuthOverlay() {
        document.getElementById('auth-overlay').style.display = 'none';
    }

    function switchAuthTab(mode) {
        authMode = mode;
        document.getElementById('tab-login').classList.toggle('active-mode', mode === 'login');
        document.getElementById('tab-signup').classList.toggle('active-mode', mode === 'signup');
        document.getElementById('auth-submit-btn').innerText = mode === 'login' ? 'Log In' : 'Sign Up';
        document.getElementById('auth-error').style.display = 'none';
    }

    function showAuthError(msg) {
        const el = document.getElementById('auth-error');
        el.innerText = msg;
        el.style.display = 'block';
    }

    function updateUserBar() {
        if (!currentUser) return;
        document.getElementById('user-bar').style.display = 'flex';
        document.getElementById('user-email').innerText = currentUser.email;
        const badge = document.getElementById('user-badge');
        if (currentUser.is_pro) {
            badge.innerText = 'PRO';
            document.getElementById('user-usage').innerText = 'Unlimited analyses';
        } else {
            badge.innerText = 'FREE';
            document.getElementById('user-usage').innerText = (currentUser.analyses_today || 0) + '/3 analyses used today';
        }
    }

    async function submitAuth() {
        const email = document.getElementById('auth-email').value.trim();
        const password = document.getElementById('auth-password').value;

        if (!email || !password) {
            showAuthError('Please enter both email and password.');
            return;
        }

        const btn = document.getElementById('auth-submit-btn');
        btn.disabled = true;
        btn.innerText = authMode === 'login' ? 'Logging in...' : 'Signing up...';

        try {
            if (authMode === 'signup') {
                const signupRes = await fetch('/signup', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email: email, password: password})
                });
                const signupData = await signupRes.json();
                if (signupData.error) {
                    showAuthError(signupData.error);
                    btn.disabled = false;
                    btn.innerText = 'Sign Up';
                    return;
                }
            }

            const loginRes = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email: email, password: password})
            });
            const loginData = await loginRes.json();

            if (loginData.error) {
                showAuthError(loginData.error);
                btn.disabled = false;
                btn.innerText = authMode === 'login' ? 'Log In' : 'Sign Up';
                return;
            }

            saveUser(loginData);
            updateUserBar();
            hideAuthOverlay();

        } catch (err) {
            showAuthError('Something went wrong. Please try again.');
            btn.disabled = false;
            btn.innerText = authMode === 'login' ? 'Log In' : 'Sign Up';
        }
    }

    document.getElementById('auth-password').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') submitAuth();
    });

    async function checkLimitOrBlock() {
        if (!currentUser) {
            showAuthOverlay();
            return false;
        }
        try {
            const response = await fetch('/check-limit', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email: currentUser.email})
            });
            const data = await response.json();

            if (data.error) {
                // If the limit check itself fails, don't block the user from using the app
                return true;
            }

            currentUser.analyses_today = data.analyses_today !== undefined ? data.analyses_today : currentUser.analyses_today;
            if (data.is_pro) currentUser.is_pro = true;
            saveUser(currentUser);
            updateUserBar();

            return data.allowed;

        } catch (err) {
            return true;
        }
    }
    // ===================== END AUTH =====================

    let selectedMode = 'ema';
    let approvedPrompt = '';

    function selectMode(mode, btn) {
        selectedMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active-mode'));
        btn.classList.add('active-mode');

        if (mode === 'custom') {
            document.getElementById('custom-strategy-box').style.display = 'block';
            document.getElementById('chart-upload-box').style.display = 'none';
            document.getElementById('analyze-btn').style.display = 'none';
        } else {
            document.getElementById('custom-strategy-box').style.display = 'none';
            document.getElementById('prompt-review-box').style.display = 'none';
            document.getElementById('chart-upload-box').style.display = 'block';
            approvedPrompt = '';
        }
    }

    async function generatePrompt() {
        const strategy = document.getElementById('strategy-input').value.trim();
        if (!strategy) return;

        const btn = event.target;
        btn.innerText = '⏳ Generating...';
        btn.disabled = true;

        const response = await fetch('/generate-prompt', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({strategy: strategy})
        });

        const data = await response.json();
        document.getElementById('generated-prompt').value = data.prompt;
        document.getElementById('prompt-review-box').style.display = 'block';

        btn.innerText = '⚡ Generate Analysis Prompt';
        btn.disabled = false;
    }

    function approvePrompt() {
        approvedPrompt = document.getElementById('generated-prompt').value;
        document.getElementById('prompt-review-box').style.display = 'none';
        document.getElementById('chart-upload-box').style.display = 'block';
    }

 function showSection(section) {
        document.getElementById('chat-section').style.display = section === 'chat' ? 'flex' : 'none';
        document.getElementById('chart-section').style.display = section === 'chart' ? 'flex' : 'none';
        document.getElementById('risk-section').style.display = section === 'risk' ? 'flex' : 'none';
        document.getElementById('btn-chat').classList.toggle('active', section === 'chat');
        document.getElementById('btn-chart').classList.toggle('active', section === 'chart');
        document.getElementById('btn-risk').classList.toggle('active', section === 'risk');
    }

    function previewChart(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = document.getElementById('preview-img');
            img.src = e.target.result;
            img.style.display = 'block';
            document.getElementById('analyze-btn').style.display = 'inline-block';
        };
        reader.readAsDataURL(file);
    }

    async function analyzeChart() {
        const fileInput = document.getElementById('chart-input');
        const resultBox = document.getElementById('chart-result');

        if (!fileInput.files[0]) return;

        const allowed = await checkLimitOrBlock();
        if (!allowed) {
            resultBox.style.display = 'block';
            resultBox.innerHTML = "🚫 You've used your 3 free analyses today. Upgrade to Pro for unlimited access, or come back tomorrow.";
            return;
        }

        resultBox.style.display = 'block';
        resultBox.innerHTML = '🔍 Loki is analyzing your chart...';

        const formData = new FormData();
        formData.append('chart', fileInput.files[0]);
        formData.append('mode', selectedMode);
        if (selectedMode === 'custom' && approvedPrompt) {
            formData.append('custom_prompt', approvedPrompt);
        }

        const response = await fetch('/analyze', {
            method: 'POST',
            body: formData
        });

        const data = await response.json();
        resultBox.innerHTML = data.reply
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/## /g, '')
            .replace(/━+/g, '<hr style="border-color:#2a2a2a; margin:8px 0;">');
        document.getElementById('reset-btn').style.display = 'inline-block';
    }

    function resetChart() {
        document.getElementById('preview-img').style.display = 'none';
        document.getElementById('preview-img').src = '';
        document.getElementById('chart-input').value = '';
        document.getElementById('analyze-btn').style.display = 'none';
        document.getElementById('reset-btn').style.display = 'none';
        document.getElementById('chart-result').style.display = 'none';
        document.getElementById('chart-result').innerHTML = '';
    }

    async function sendMessage() {
        const input = document.getElementById("user-input");
        const chatBox = document.getElementById("chat-box");
        const message = input.value.trim();
        if (!message) return;

        const suggestions = document.getElementById('suggestions');
        if (suggestions) suggestions.remove();

        chatBox.innerHTML += `
            <div class="message user">
                <div class="label">Kishan</div>
                <div class="bubble">${message}</div>
            </div>`;
        input.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        chatBox.innerHTML += `<div class="typing" id="typing">Loki is thinking...</div>`;

        const response = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message: message})
        });

        const data = await response.json();
        document.getElementById("typing").remove();

        chatBox.innerHTML += `
            <div class="message loki">
                <div class="label">Loki</div>
                <div class="bubble">${data.reply}</div>
            </div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    document.getElementById("user-input").addEventListener("keypress", function(e) {
        if (e.key === "Enter") sendMessage();
    });

    const allSuggestions = [
        "What is the price of Bitcoin?",
        "What is the price of Ethereum?",
        "What is the price of Solana?",
        "Summarize the crypto market today",
        "Is Bitcoin bullish or bearish right now?",
        "What is the best crypto to buy today?",
        "Explain the 9/15 EMA strategy",
        "What is a good risk to reward ratio?",
        "How do I manage risk in crypto trading?",
        "What is support and resistance?",
        "Is now a good time to buy Ethereum?",
        "What is market structure in trading?"
    ];

    function loadSuggestions() {
        const container = document.getElementById('suggestion-cards');
        if (!container) return;
        const shuffled = allSuggestions.sort(() => 0.5 - Math.random());
        const selected = shuffled.slice(0, 4);
        container.innerHTML = '';
        selected.forEach(q => {
            const card = document.createElement('button');
            card.innerText = q;
            card.style.cssText = `
                background-color: #1a1a1a;
                color: #ececec;
                border: 1px solid #2a2a2a;
                border-radius: 12px;
                padding: 10px 16px;
                font-size: 13px;
                cursor: pointer;
                font-weight: normal;
                transition: background 0.2s;
                max-width: 280px;
                text-align: left;
            `;
            card.onmouseover = () => card.style.backgroundColor = '#222';
            card.onmouseout = () => card.style.backgroundColor = '#1a1a1a';
            card.onclick = () => {
                document.getElementById('user-input').value = q;
                sendMessage();
            };
            container.appendChild(card);
        });
   }
     let tradeDirection = 'long';

    function setDirection(dir) {
        tradeDirection = dir;
        document.getElementById('btn-long').style.borderColor = dir === 'long' ? '#555' : '#2a2a2a';
        document.getElementById('btn-short').style.borderColor = dir === 'short' ? '#555' : '#2a2a2a';
    }

    function previewRiskChart(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = document.getElementById('risk-preview-img');
            img.src = e.target.result;
            img.style.display = 'block';
        };
        reader.readAsDataURL(file);
    }

    async function analyzeRisk() {
        const entry = document.getElementById('entry-price').value;
        const current = document.getElementById('current-price').value;
        const stopLoss = document.getElementById('stop-loss').value;
        const takeProfit = document.getElementById('take-profit').value;
        const capital = document.getElementById('capital').value;
        const chartFile = document.getElementById('risk-chart-input').files[0];
        const resultBox = document.getElementById('risk-result');

        if (!entry || !current || !stopLoss || !takeProfit) {
            alert('Please fill in all required fields.');
            return;
        }

        const allowed = await checkLimitOrBlock();
        if (!allowed) {
            resultBox.style.display = 'block';
            resultBox.innerHTML = "🚫 You've used your 3 free analyses today. Upgrade to Pro for unlimited access, or come back tomorrow.";
            return;
        }

        resultBox.style.display = 'block';
        resultBox.innerHTML = '⚡ Risk Sentinel is analyzing your trade...';

        const formData = new FormData();
        formData.append('direction', tradeDirection);
        formData.append('entry', entry);
        formData.append('current', current);
        formData.append('stop_loss', stopLoss);
        formData.append('take_profit', takeProfit);
        if (capital) formData.append('capital', capital);
        if (chartFile) formData.append('chart', chartFile);

        const response = await fetch('/risk-analysis', {
            method: 'POST',
            body: formData
        });

        const data = await response.json();
        resultBox.innerHTML = data.reply
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/## /g, '')
            .replace(/━+/g, '<hr style="border-color:#2a2a2a; margin:8px 0;">');
    }
   

    window.onload = function() {
        loadSuggestions();
        currentUser = loadUser();
        if (currentUser) {
            hideAuthOverlay();
            updateUserBar();
        } else {
            showAuthOverlay();
        }
    }
</script>
</body>
