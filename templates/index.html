<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loki AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0d0d0d;
            color: #ececec;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            height: 100vh;
        }

        /* SIDEBAR */
        #sidebar {
            width: 220px;
            background-color: #111111;
            border-right: 1px solid #1e1e1e;
            display: flex;
            flex-direction: column;
            padding: 20px 16px;
            gap: 10px;
        }

        #sidebar h2 {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .sidebar-btn {
            background-color: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 12px 14px;
            color: #ececec;
            font-size: 14px;
            cursor: pointer;
            text-align: left;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-btn:hover { background-color: #222; }
        .sidebar-btn.active { background-color: #2a2a2a; border-color: #444; }

        .sidebar-btn span { font-size: 18px; }

        /* MAIN */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #header {
            padding: 16px 24px;
            border-bottom: 1px solid #1e1e1e;
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            text-align: center;
            letter-spacing: 1px;
        }

        /* CHAT SECTION */
        #chat-section {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #chart-section {
            flex: 1;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 750px;
            width: 100%;
            margin: 0 auto;
        }

        .message { display: flex; flex-direction: column; max-width: 80%; }
        .message.user { align-self: flex-end; align-items: flex-end; }
        .message.loki { align-self: flex-start; align-items: flex-start; }

        .label {
            font-size: 11px;
            color: #666;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .message.user .bubble {
            background-color: #2f2f2f;
            color: #ececec;
            border-bottom-right-radius: 4px;
        }

        .message.loki .bubble {
            background-color: #1a1a1a;
            color: #ececec;
            border-bottom-left-radius: 4px;
            border: 1px solid #2a2a2a;
        }

        #input-area {
            padding: 16px 20px;
            border-top: 1px solid #1e1e1e;
            display: flex;
            gap: 10px;
            max-width: 750px;
            width: 100%;
            margin: 0 auto 16px;
        }

        #user-input {
            flex: 1;
            background-color: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 12px 16px;
            color: #ececec;
            font-size: 15px;
            outline: none;
        }

        #user-input:focus { border-color: #555; }
        #user-input::placeholder { color: #555; }

        button {
            background-color: #ffffff;
            color: #000;
            border: none;
            border-radius: 12px;
            padding: 12px 20px;
            font-size: 15px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        button:hover { background-color: #e0e0e0; }

        .typing {
            color: #555;
            font-size: 13px;
            padding-left: 4px;
        }

        /* CHART ANALYSIS */
        #chart-upload-box {
            background-color: #1a1a1a;
            border: 2px dashed #2a2a2a;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            width: 100%;
            max-width: 600px;
            cursor: pointer;
            transition: border 0.2s;
        }

        #chart-upload-box:hover { border-color: #555; }

        #chart-upload-box p {
            color: #555;
            margin-top: 10px;
            font-size: 14px;
        }

        #chart-upload-box .icon { font-size: 48px; }

        #chart-result {
            margin-top: 30px;
            background-color: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 600px;
            font-size: 15px;
            line-height: 1.8;
            white-space: pre-wrap;
            display: none;
        }

        #chart-input { display: none; }

        #analyze-btn {
            margin-top: 16px;
            display: none;
        }

        #preview-img {
            margin-top: 16px;
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            display: none;
        }

        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-track { background: transparent; }
        #chat-box::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <div id="sidebar">
        <h2>⚡ Loki AI</h2>
        <button class="sidebar-btn active" id="btn-chat" onclick="showSection('chat')">
            <span>💬</span> Chat
        </button>
        <button class="sidebar-btn" id="btn-chart" onclick="showSection('chart')">
            <span>📊</span> Chart Analysis
        </button>
    </div>

    <!-- MAIN -->
    <div id="main">
        <div id="header">⚡ Loki AI</div>

        <!-- CHAT SECTION -->
        <div id="chat-section">
            <div id="chat-box">
    <div id="suggestions">
        <p style="color:#555; font-size:13px; margin-bottom:16px; text-align:center;">Try asking Loki...</p>
        <div id="suggestion-cards" style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center;"></div>
    </div>
</div>
          
  <div id="input-area">
                <input type="text" id="user-input" placeholder="Message Loki...">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>

        <!-- CHART SECTION -->
        <div id="chart-section">
            <div id="chart-upload-box" onclick="document.getElementById('chart-input').click()">
                <div class="icon">📈</div>
                <h3>Upload Your Chart</h3>
                <p>Click to upload a chart screenshot for AI trade analysis</p>
                <img id="preview-img" src="" alt="preview">
            </div>

            <input type="file" id="chart-input" accept="image/*" onchange="previewChart(event)">
          <button id="analyze-btn" onclick="analyzeChart()">🔍 Analyze Trade</button>
<button id="reset-btn" onclick="resetChart()" style="display:none; background-color:#1a1a1a; color:#ececec; border:1px solid #2a2a2a; margin-top:10px;">🔄 Analyze New Chart</button>

            <div id="chart-result"></div>
        </div>
    </div>

    <script>
        function showSection(section) {
            document.getElementById('chat-section').style.display = section === 'chat' ? 'flex' : 'none';
            document.getElementById('chart-section').style.display = section === 'chart' ? 'flex' : 'none';
            document.getElementById('btn-chat').classList.toggle('active', section === 'chat');
            document.getElementById('btn-chart').classList.toggle('active', section === 'chart');
        }

        function previewChart(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('preview-img');
                img.src = e.target.result;
                img.style.display = 'block';
                document.getElementById('analyze-btn').style.display = 'inline-block';
            };
            reader.readAsDataURL(file);
        }

      async function analyzeChart() {
            const fileInput = document.getElementById('chart-input');
            const resultBox = document.getElementById('chart-result');

            if (!fileInput.files[0]) return;

            resultBox.style.display = 'block';
            resultBox.innerHTML = '🔍 Loki is analyzing your chart...';

            const formData = new FormData();
            formData.append('chart', fileInput.files[0]);

            const response = await fetch('/analyze', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();
            resultBox.innerHTML = data.reply
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/## /g, '')
    .replace(/━+/g, '<hr style="border-color:#2a2a2a; margin:8px 0;">');
            document.getElementById('reset-btn').style.display = 'inline-block';
        }

        function resetChart() {
            document.getElementById('preview-img').style.display = 'none';
            document.getElementById('preview-img').src = '';
            document.getElementById('chart-input').value = '';
            document.getElementById('analyze-btn').style.display = 'none';
            document.getElementById('reset-btn').style.display = 'none';
            document.getElementById('chart-result').style.display = 'none';
            document.getElementById('chart-result').innerHTML = '';
        }

        async function sendMessage() {

            const suggestions = document.getElementById('suggestions');
            if (suggestions) suggestions.remove(); 
            const input = document.getElementById("user-input");
            const chatBox = document.getElementById("chat-box");
            const message = input.value.trim();
            if (!message) return;

            chatBox.innerHTML += `
                <div class="message user">
                    <div class="label">Kishan</div>
                    <div class="bubble">${message}</div>
                </div>`;
            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            chatBox.innerHTML += `<div class="typing" id="typing">Loki is thinking...</div>`;

            const response = await fetch("/chat", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({message: message})
            });

            const data = await response.json();
            document.getElementById("typing").remove();

            chatBox.innerHTML += `
                <div class="message loki">
                    <div class="label">Loki</div>
                    <div class="bubble">${data.reply}</div>
                </div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        document.getElementById("user-input").addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });
    const allSuggestions = [
    "What is the price of Bitcoin?",
    "What is the price of Ethereum?",
    "What is the price of Solana?",
    "Summarize the crypto market today",
    "Is Bitcoin bullish or bearish right now?",
    "What is the best crypto to buy today?",
    "Explain the 9/15 EMA strategy",
    "What is a good risk to reward ratio?",
    "How do I manage risk in crypto trading?",
    "What is support and resistance?",
    "Is now a good time to buy Ethereum?",
    "What is market structure in trading?"
];

function loadSuggestions() {
    const container = document.getElementById('suggestion-cards');
    if (!container) return;
    const shuffled = allSuggestions.sort(() => 0.5 - Math.random());
    const selected = shuffled.slice(0, 4);
    container.innerHTML = '';
    selected.forEach(q => {
        const card = document.createElement('button');
        card.innerText = q;
        card.style.cssText = `
            background-color: #1a1a1a;
            color: #ececec;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 10px 16px;
            font-size: 13px;
            cursor: pointer;
            font-weight: normal;
            transition: background 0.2s;
            max-width: 280px;
            text-align: left;
        `;
        card.onmouseover = () => card.style.backgroundColor = '#222';
        card.onmouseout = () => card.style.backgroundColor = '#1a1a1a';
        card.onclick = () => {
            document.getElementById('user-input').value = q;
            sendMessage();
        };
        container.appendChild(card);
    });
}

window.onload = function() {
    loadSuggestions();
}

</script>
</body>
</html>
