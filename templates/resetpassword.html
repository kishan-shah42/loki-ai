<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Loki AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0d0d0d;
            color: #ececec;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
        }
        #card {
            background-color: #111111;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 380px;
        }
        h2 { color: #fff; text-align: center; margin-bottom: 6px; font-size: 22px; }
        p.subtitle { color: #666; text-align: center; font-size: 13px; margin-bottom: 24px; }
        input {
            width: 100%;
            margin-bottom: 12px;
            background-color: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 12px 14px;
            color: #ececec;
            font-size: 14px;
            outline: none;
        }
        input:focus { border-color: #555; }
        input::placeholder { color: #555; }
        button {
            background-color: #ffffff;
            color: #000;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 15px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            margin-top: 4px;
        }
        button:hover { background-color: #e0e0e0; }
        button:disabled { opacity: 0.6; cursor: default; }
        #status { display:none; margin-top: 14px; text-align: center; font-size: 13px; }
        #status.success { color: #4ade80; }
        #status.error { color: #ff6b6b; }
    </style>
</head>
<body>
    <div id="card">
        <h2>⚡ Loki AI</h2>
        <p class="subtitle">Set a new password</p>

        <input type="password" id="new-password" placeholder="New password">
        <input type="password" id="confirm-password" placeholder="Confirm new password">

        <button id="submit-btn" onclick="submitReset()">Reset Password</button>

        <div id="status"></div>
    </div>

    <script>
        const token = "{{ token }}";

        async function submitReset() {
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const status = document.getElementById('status');
            const btn = document.getElementById('submit-btn');

            if (!newPassword || !confirmPassword) {
                status.className = 'error';
                status.innerText = 'Please fill in both fields.';
                status.style.display = 'block';
                return;
            }

            if (newPassword !== confirmPassword) {
                status.className = 'error';
                status.innerText = "Passwords don't match.";
                status.style.display = 'block';
                return;
            }

            if (!token) {
                status.className = 'error';
                status.innerText = 'Invalid reset link.';
                status.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.innerText = 'Resetting...';

            try {
                const response = await fetch('/reset-password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({token: token, new_password: newPassword})
                });
                const data = await response.json();

                if (data.error) {
                    status.className = 'error';
                    status.innerText = data.error;
                    status.style.display = 'block';
                    btn.disabled = false;
                    btn.innerText = 'Reset Password';
                    return;
                }

                status.className = 'success';
                status.innerText = '✅ Password reset! You can now go back and log in with your new password.';
                status.style.display = 'block';
                btn.innerText = 'Done';

            } catch (err) {
                status.className = 'error';
                status.innerText = 'Something went wrong. Please try again.';
                status.style.display = 'block';
                btn.disabled = false;
                btn.innerText = 'Reset Password';
            }
        }

        document.getElementById('confirm-password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') submitReset();
        });
    </script>
</body>
</html>
